    max_calls_per_run: 200             # DESIGN PROPOSAL: prevents runaway loops

# ==============================================================================
# PROMPT TEMPLATES (DESIGN PROPOSAL; NONE VERBATIM IN SOURCE)
# ==============================================================================
prompt_templates:
  system_prompt: |
    You are a careful research assistant maintaining a local Markdown wiki.
    Non-negotiable rules:
    1) Do not fabricate facts.
    2) Every nontrivial claim must be grounded in provided local sources
       (wiki pages, raw documents, or tool outputs) and must include citations.
    3) When uncertain, explicitly write 'Unknown' and propose what to ingest next.
    4) Follow the requested output schemas exactly.
  wiki_compile_incremental_prompt: |
    TASK: Incrementally compile new/changed raw sources into the compiled wiki.

    INPUTS PROVIDED:
    - changed_raw_files: list of {path, type, content_excerpt or content}
    - existing_wiki_context: list of {path, content_excerpt or content}
    - conventions: directory targets, link style, required sections

    REQUIREMENTS:
    1) For each changed raw source, create/update a source summary page.
    2) Extract concepts; create/update concept pages; add bidirectional links.
    3) Maintain/update index files with brief summaries.
    4) Do not rewrite unrelated pages.
    5) Do not invent facts; cite raw excerpts or existing wiki pages.

    OUTPUT SCHEMA (JSON):
    {
      "files_to_write": [{"path": "...", "content_markdown": "..."}],
      "files_to_edit": [{"path": "...", "patch_instructions": "..."}],
      "new_concepts": [{"title": "...", "rationale": "..."}],
      "open_questions": ["..."]
    }
  wiki_qa_prompt: |
    TASK: Answer the user question by consulting the local wiki.

    PROCESS:
    1) Use index excerpts to propose a shortlist of relevant pages (paths).
    2) After pages are provided, synthesize an answer grounded in those pages.
    3) Cite wiki paths for every substantive claim.
    4) If the wiki lacks information, explicitly say so and recommend what to ingest.

    OUTPUT FORMAT (Markdown):
    ## Conclusion
    ## Evidence (with citations)
    ## Caveats / Unknowns
    ## Pages Consulted (paths)
    ## Recommended Wiki Improvements
  artifact_render_markdown_report_prompt: |
    TASK: Render a durable Markdown report to be saved as a file in the repo.

    CONSTRAINTS:
    - Output must be valid Markdown suitable for Obsidian.
    - Must include citations as wiki links or explicit repo-relative paths.
    - Do not introduce facts beyond the grounded findings provided.

    STRUCTURE:
    # {Title}
    ## Executive Summary
    ## Main Analysis
    ## Evidence & Citations
    ## Limitations
    ## Next Questions
  artifact_render_marp_prompt: |
    TASK: Render a Marp slide deck (Marp-flavored Markdown).

    CONSTRAINTS:
    - Use '---' slide separators.
    - Keep slides concise (one main idea per slide).
    - Include a final 'References' slide.
    - Ground all factual bullets in citations.
  wiki_lint_prompt: |
    TASK: Run health checks over the wiki.

    FIND AND REPORT (with exact evidence excerpts and page paths):
    1) Contradictions / inconsistencies
    2) Missing data / missing citations / undefined terms
    3) Structural issues: broken links, orphan pages, duplicates
    4) Opportunity: interesting cross-links, candidate new pages

    OUTPUT (Markdown):
    ## Summary Table (Issue, Severity, Page)
    ## Detailed Findings (with evidence excerpts)
    ## Proposed Minimal Patches (do not rewrite entire pages)
    ## Suggested New Pages / Questions
  synthetic_data_generation_prompt: |
    TASK: Generate synthetic supervised examples strictly grounded in provided wiki pages.

    RULES:
    - Every example must be answerable using ONLY the provided pages.
    - Each example must include citations (repo-relative wiki page paths).
    - Do not add external facts.

    OUTPUT: JSONL (one JSON object per line) with fields:
    - instruction
    - input
    - output
    - citations (list of paths)
    - difficulty (EASY|MEDIUM|HARD)
    - notes

# ======================================================================================
# SCRIPTED CALLS ORCHESTRATION (DESIGN PROPOSAL; REQUIRED TO IMPLEMENT "AGENT" BEHAVIOR)
# ======================================================================================
scripted_calls_framework_details:
  call_ordering_per_cycle:
    - "ingest_raw_updates"
    - "compile_incremental_wiki"
    - "refresh_indexes_if_needed"
    - "run_lint_health_checks"
    - "apply_lint_patches_after_review"
    - "answer_selected_questions"
    - "render_outputs_as_files"
    - "file_outputs_back_into_wiki"
  chunking_policy:
    max_chars_per_chunk: 12000
    overlap_chars: 800
    preserve_headings: true
    include_image_captions_if_present: true
    for_code_repos:
      summarize_readme_first: true
      then_index_src_tree: true
      max_files_to_sample_per_run: 50
      prefer_entrypoints:
        - "README.md"
        - "pyproject.toml"
        - "package.json"
        - "setup.py"
    for_pdfs:
      prefer_extracted_markdown_if_available: true
      else_use_pdf_text_tool: true
  file_diff_and_patch_strategy:
    prefer_patch_edits_over_full_rewrite: true
    max_full_rewrite_file_chars: 20000
    patch_format: "natural_language_patch_instructions_with_exact_anchors"
    edit_scope_rule: "only_pages_touched_by_changed_raw_or_lint_findings"
  validation_rules_before_writing_files:
    allowed_write_roots:
      - "wiki/"
      - "assets/"
      - "logs/"
    forbidden_write_roots:
      - "raw/"
    require_markdown_extension_for_wiki_pages: true
    require_nonempty_title_header: true
    require_provenance_block_on_source_summaries: true
    link_validation:
      check_internal_links_resolve: true
      allow_unresolved_links_if_flagged: true
      unresolved_link_marker: "UNRESOLVED_LINK"
    no_fabrication_heuristics:
      flag_numbers_without_citation: true
      flag_named_entities_without_source: true
  logging_schema:
    log_dir: "logs/"
    per_call_log_fields:
      - "timestamp_utc"
      - "stage_name"
      - "model_id"
      - "decoding_settings"
      - "prompt_text"
      - "input_file_paths_and_hashes"
      - "tool_calls_and_results"
      - "raw_model_output"
      - "validated_file_operations"
      - "warnings"
    per_run_summary_fields:
      - "run_id"
      - "start_time_utc"
      - "end_time_utc"
      - "raw_inputs_changed"
      - "wiki_files_written"
      - "wiki_files_edited"
      - "lint_issues_found_count"
      - "questions_answered_count"
      - "artifacts_generated_count"

# =====================================================================================
# RETRIEVAL / SEARCH TOOL PARAMETERS (SOURCE-FAITHFUL INTENT + DESIGN PROPOSAL DETAILS)
# =====================================================================================
retrieval_and_search_parameters:
  naive_search_engine_over_wiki: true
  interfaces:
    web_ui: true
    cli_tool_for_llm: true
  search_engine_design:
    ranking_function: "BM25"
    tokenization:
      lowercase: true
      strip_punctuation: true
      split_on_whitespace: true
      stopwords: "english_basic"
      stemming: false
    field_boosts:
      title: 3.0
      headings: 2.0
      body: 1.0
      tags_front_matter: 2.0
    snippet_policy:
      snippet_chars: 240
      highlight_query_terms: true
    top_k_default: 20
    max_results_returned_to_llm: 10
  tool_assisted_qa_policy:
    use_search_first_for_broad_queries: true
    search_query_rewrite_rounds_max: 2
    pages_to_read_max: 8

# ====================================================================================
# LINTING / HEALTH CHECK PARAMETERS (SOURCE-FAITHFUL INTENT + DESIGN PROPOSAL DETAILS)
# ====================================================================================
linting_thresholds_and_policies:
  llm_health_checks_enabled: true
  targets_source_faithful:
    inconsistent_data_detection: true
    missing_data_imputation: true
    uses_web_searchers_for_imputation: true
    connection_discovery: true
    new_article_candidates: true
    data_integrity_enhancement: true
    suggest_further_questions: true
  severity_levels:
    - "INFO"
    - "LOW"
    - "MEDIUM"
    - "HIGH"
    - "CRITICAL"
  contradiction_policy:
    what_counts_as_contradiction:
      - "two pages define same concept with incompatible definitions"
      - "two pages report different numeric values for same quantity without context"
      - "timeline/date conflicts for same event"
    default_severity: "HIGH"
    require_evidence_excerpts: true
    require_proposed_resolution_options:
      - "scope_disambiguation"
      - "merge_pages"
      - "mark_one_as_outdated"
      - "add_citations_and_context"
  missing_data_policy:
    what_counts_as_missing:
      - "undefined acronym used without definition"
      - "TODO placeholder"
      - "claim without citation in a summary/concept page"
      - "broken link to a referenced page"
    default_severity: "MEDIUM"
  web_imputation_policy:
    allowed_if:
      - "missing datum is factual and externally verifiable (date, author, definition)"
      - "web search tool returns authoritative source (paper, docs, official page)"
    forbidden_if:
      - "imputation would require guesswork or subjective interpretation"
      - "no authoritative source found"
    provenance_requirements:
      must_record_source_url: true
      must_quote_or_snippet: true
      must_label_requires_verification_if_not_primary: true
  connection_discovery_policy:
    max_new_connection_suggestions_per_run: 20
    suggest_new_concept_page_if:
      - ">=3 sources mention same idea"
      - "idea appears in multiple subdomains and lacks a concept page"

# ==================================================================================================
# OUTPUT ARTIFACTS & PLOT CONSTRUCTION PARAMETERS (SOURCE-FAITHFUL INTENT + DESIGN PROPOSAL DETAILS)
# ==================================================================================================
outputs_and_visualizations:
  preferred_output_modalities_source_faithful:
    markdown_files: true
    marp_slides: true
    matplotlib_images: true
  artifact_filing_policy_source_faithful:
    file_outputs_back_into_wiki: true
    queries_add_up: true
  artifact_paths_design_proposal:
    reports_dir: "wiki/derived/reports/"
    slides_dir: "wiki/derived/slides/"
    figures_dir: "wiki/derived/figures/"
  plot_construction_parameters:
    library: "matplotlib"
    default_style:
      figure_size_inches: [10, 6]
      dpi: 200
      grid: true
      title_fontsize: 14
      label_fontsize: 12
    output_formats:
      - ".png"

# ======================================================================================
# NETWORK ARCHITECTURE PARAMETERS (SOURCE-FAITHFUL: NONE; DESIGN PROPOSAL PLACEHOLDERS)
# ======================================================================================
network_architecture_parameters:
  explicit_architectures_named_in_source: []
  fine_tuning_base_model:
    model_id: "openai/gpt-oss-20b"
    parameter_count_estimate: 20000000000
    architecture_details:
      type: "unknown_not_specified_in_source_or_user_prompt"
      num_layers: null
      hidden_size: null
      num_attention_heads: null
      context_window_tokens: null
      notes: "No internal architecture fields are provided by the availed post or the user. Do not fabricate. Populate if the model card is available."
  qa_model:
    model_id: "gpt-5.2"
    architecture_details:
      type: "proprietary_unspecified"
      notes: "Architecture details are not provided; treat as a black-box API model."

# ===========================================================================================
# SYNTHETIC DATA + FINE-TUNING EXPLORATION (SOURCE-FAITHFUL INTENT + DESIGN PROPOSAL DETAILS)
# ===========================================================================================
fine_tuning_exploration:
  enabled: true
  source_faithful_goal: "move_knowledge_from_context_into_weights"
  synthetic_data_schema:
    format: "jsonl"
    fields:
      - "instruction"
      - "input"
      - "output"
      - "citations"
      - "difficulty"
      - "notes"
    grounding_rule: "output_must_be_answerable_from_cited_pages_only"
  train_val_test_split_policy:
    split_unit: "source_id_or_concept_cluster"
    train_fraction: 0.80
    val_fraction: 0.10
    test_fraction: 0.10
    no_overlap_constraint: true
  fine_tuning_method:
    approach: "SFT_with_LoRA"
    base_model_id: "openai/gpt-oss-20b"
    lora_config:
      rank_r: 16
      alpha: 32
      dropout: 0.05
      target_modules: "ATTENTION_AND_MLP_DEFAULT"
  training_hyperparameters:
    learning_rate: 1e-4
    batch_size_effective: 128
    num_epochs: 2
    weight_decay: 0.01
    warmup_ratio: 0.03
    max_seq_length_tokens: 8192
    optimizer: "AdamW"
    gradient_clip_norm: 1.0
    mixed_precision: "bf16_or_fp16"
    seed: 42
  evaluation_protocol:
    benchmarks:
      heldout_qa_set:
        size_questions: 50
        requires_multi_document_synthesis_fraction: 0.4
        citation_required: true
      regression_questions_from_real_usage:
        size_questions: 50
        citation_required: true
    metrics:
      answer_quality_human_rubric:
        - "factuality"
        - "completeness"
        - "clarity"
        - "calibration_of_uncertainty"
      grounding_metrics:
        - "citation_coverage_rate"
        - "citation_correctness_rate"
      efficiency_metrics:
        - "pages_read_per_answer"
        - "tool_calls_per_answer"
        - "latency_seconds_per_answer"
      safety_metrics:
        - "hallucination_incidents_count"
        - "uncertainty_marking_rate_when_unsupported"
    acceptance_criteria:
      no_significant_drop_in_citation_correctness: true
      improve_efficiency_or_recall: true

