methodological_notes:
  source_faithful_invariants:
    - "Raw sources are collected locally and indexed under raw/."
    - "An LLM incrementally compiles a Markdown wiki from raw/."
    - "The compiled wiki includes summaries, backlinks, concept categorization, and concept articles."
    - "Index files and brief summaries support Q&A at small scale without fancy RAG."
    - "Outputs are rendered as files (Markdown, Marp slides, matplotlib images) and viewed in Obsidian."
    - "Outputs are often filed back into the wiki so explorations accumulate."
    - "LLM linting/health checks improve integrity (inconsistencies, missing data with web search, connections)."
    - "Auxiliary tools (naive search engine) can be used directly and via CLI by the LLM."
