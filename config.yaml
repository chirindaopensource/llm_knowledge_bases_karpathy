  visual_output_viewed_in_obsidian: true  # SOURCE-FAITHFUL
  matplotlib_used_for_figures: true  # SOURCE-FAITHFUL: "matplotlib images"

# ==============================================================================
# SCALE REGIME (SOURCE-FAITHFUL)
# ==============================================================================
scale_regime_explicit_example:
  wiki_article_count_example: 100  # SOURCE-FAITHFUL: "~100 articles"
  wiki_word_count_example: 400000  # SOURCE-FAITHFUL: "~400K words"
  scale_label: "small_scale"  # SOURCE-FAITHFUL: "at this ~small scale"
  rag_requirement_claim:
    fancy_rag_expected: true  # SOURCE-FAITHFUL: "I thought I had to reach for fancy RAG"
    fancy_rag_needed_in_example_regime: false  # SOURCE-FAITHFUL: "but ... pretty good ... at this small scale"
    reason: "auto-maintained_indexes_and_brief_summaries"  # SOURCE-FAITHFUL

# ===============================================================================
# LLM PROVIDER / AUTH / MODEL SELECTION (DESIGN PROPOSAL; USER-SPECIFIED MODELS)
