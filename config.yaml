  auth:
    openai_api_key_env_var: "OPENAI_API_KEY"  # DESIGN PROPOSAL; user requested keys included—this is the safe form
    openai_api_key_value_placeholder: "${OPENAI_API_KEY}"  # DESIGN PROPOSAL placeholder
  model_ids:
    question_answering: "gpt-5.2"  # USER-SPECIFIED
    fine_tuning_base: "openai/gpt-oss-20b"  # USER-SPECIFIED
    wiki_compilation: "gpt-5.2"  # DESIGN PROPOSAL
    linting: "gpt-5.2"  # DESIGN PROPOSAL
    artifact_rendering: "gpt-5.2"  # DESIGN PROPOSAL
    synthetic_data_generation: "gpt-5.2"  # DESIGN PROPOSAL
    optional_fast_model: null  # DESIGN PROPOSAL
  capabilities_assumptions:
    multimodal_enabled_for_gpt_5_2: true  # USER: "a good multimodal llm from openai"
    tool_calling_enabled: true  # DESIGN PROPOSAL: needed for CLI search, file reads, web search

# ==============================================================================
