# ===================================================================================================
# LLM KNOWLEDGE BASES — COMPLETE STUDY CONFIGURATION (DESIGN PROPOSAL + SOURCE-FAITHFUL CONSTRAINTS)
# ===================================================================================================
# Notes on epistemic status:
# - Anything tagged "SOURCE-FAITHFUL" is explicitly stated in the availed X post.
# - Anything tagged "DESIGN PROPOSAL" is an implementation-grade default required to run scripted calls.
# - The post provides no equations, no explicit neural network architecture details, and no verbatim prompts.
# ==============================================================================

# ==============================================================================
# STUDY METADATA (SOURCE-FAITHFUL)
# ==============================================================================
study_metadata:
  source_url: "https://x.com/karpathy/status/2039805659525644595"  # SOURCE-FAITHFUL: provided in resource header
  date: "2026-04-02"  # SOURCE-FAITHFUL: provided in resource header
  author: "Andrej Karpathy"  # SOURCE-FAITHFUL: provided in resource header
  title: "LLM Knowledge Bases"  # SOURCE-FAITHFUL: provided in resource header
  document_type: "x_post_workflow_note_not_formal_paper"  # SOURCE-FAITHFUL: format implies not a paper
  explicit_equations_in_source: 0  # SOURCE-FAITHFUL: none present in provided excerpt
  explicit_neural_network_architectures_named_in_source: []  # SOURCE-FAITHFUL: none named (only "LLMs" generically)
  explicit_prompt_templates_in_source: []  # SOURCE-FAITHFUL: none included verbatim

# ==============================================================================
# CORE WORKFLOW OVERVIEW (SOURCE-FAITHFUL)
# ==============================================================================
workflow_overview:
  tldr_pipeline:
    raw_collection: true  # SOURCE-FAITHFUL: "raw data ... is collected"
    llm_compiles_wiki: true  # SOURCE-FAITHFUL: "compiled by an LLM into a .md wiki"
    llm_operates_with_tools: true  # SOURCE-FAITHFUL: "operated on by various CLIs by the LLM"
    viewable_in_obsidian: true  # SOURCE-FAITHFUL: "viewable in Obsidian"
  human_edit_policy:
    human_rarely_edits_wiki_directly: true  # SOURCE-FAITHFUL: "I rarely touch it directly"
    llm_maintains_wiki: true  # SOURCE-FAITHFUL: "LLM writes and maintains all of the data"

# ==============================================================================
# FILESYSTEM / REPO CONVENTIONS (MIXED: SOURCE-FAITHFUL + DESIGN PROPOSAL)
# ==============================================================================
filesystem_conventions:
  raw_directory: "raw/"  # SOURCE-FAITHFUL: "index source documents ... into a raw/ directory"
  wiki_directory: "wiki/"  # DESIGN PROPOSAL: post says "directory structure" of .md files but doesn't name it
  assets_directory: "assets/"  # DESIGN PROPOSAL: helpful central place for shared images
  logs_directory: "logs/"  # DESIGN PROPOSAL: required for reproducibility and audit
  eval_directory: "eval/"  # DESIGN PROPOSAL: required to evaluate Q&A and fine-tuning
  compiled_wiki_representation:
    format: "collection_of_markdown_files"  # SOURCE-FAITHFUL: "a collection of .md files"
    file_extension: ".md"  # SOURCE-FAITHFUL
    organization: "directory_structure"  # SOURCE-FAITHFUL
    suggested_subdirs:
      index: "wiki/index/"      # DESIGN PROPOSAL: supports "index files and brief summaries"
      concepts: "wiki/concepts/"# DESIGN PROPOSAL: supports "concepts" + "articles for them"
      sources: "wiki/sources/"  # DESIGN PROPOSAL: supports per-raw-source summaries
      derived: "wiki/derived/"  # DESIGN PROPOSAL: supports filing outputs back into wiki
  image_localization_requirement:
    download_related_images_locally: true  # SOURCE-FAITHFUL: "download all related images to local"
    allowed_image_extensions: [".png", ".jpg", ".jpeg", ".webp", ".svg"]  # DESIGN PROPOSAL
    linking_policy:
      allow_relative_links: true  # DESIGN PROPOSAL: typical in Obsidian vaults
      preferred_link_style: "obsidian_wikilink_or_relative_path"  # DESIGN PROPOSAL
  link_conventions:
    wiki_link_style: "obsidian_wikilink"  # DESIGN PROPOSAL (consistent with Obsidian); post doesn't specify syntax
    backlinks_required: true  # SOURCE-FAITHFUL: "backlinks"
    cross_links_required: true  # SOURCE-FAITHFUL: "links them all"
  immutability_rules:
    raw_is_append_only: true  # DESIGN PROPOSAL: necessary for provenance/audit; post implies raw is source corpus
    wiki_is_llm_managed: true  # SOURCE-FAITHFUL: LLM writes/maintains wiki

# =======================================================================================
# RAW / UNPROCESSED INPUT DATA STRUCTURE SCHEMAS (DESIGN PROPOSAL CONSISTENT WITH SOURCE)
# =======================================================================================
raw_input_schemas:
  raw_directory_layout_schema:
    description: "Representative raw/ layout consistent with SOURCE-FAITHFUL inputs: articles, papers, repos, datasets, images."
    expected_subdirs:
      web_articles_markdown: "raw/web/"
      papers_pdf_and_extracts: "raw/papers/"
      repos_snapshots: "raw/repos/"
      datasets: "raw/datasets/"
      standalone_images: "raw/images/"
    required_files:
      manifest: "raw/manifest.yaml"  # DESIGN PROPOSAL: enables incremental compilation tracking
  raw_manifest_schema:
    path: "raw/manifest.yaml"
    schema_version: 1
    top_level_fields:
      version: "int"
      created_at: "iso_date_string"
      items: "list[item]"
    item_schema:
      id: "string (unique)"
      type: "enum: web_article_markdown | paper_pdf | paper_extracted_markdown | git_repo_snapshot | dataset | image | other"
      title_or_name: "string"
      source_url: "string_or_null"
      ingested_at: "iso_timestamp"
      local_path: "string (repo-relative path)"
      asset_dir: "string_or_null"
      revision: "object_or_null (for repos)"
      authors: "list[string]_or_null"
      year: "int_or_null"
      venue: "string_or_null"
      tags: "list[string]_or_null"
      notes: "list[string]_or_null"
    example_item_types_in_scope:
      - "web_article_markdown"  # SOURCE-FAITHFUL: web articles clipped to .md
      - "paper_pdf"             # SOURCE-FAITHFUL: papers
      - "git_repo_snapshot"     # SOURCE-FAITHFUL: repos
      - "dataset"               # SOURCE-FAITHFUL: datasets
      - "image"                 # SOURCE-FAITHFUL: images
  dataset_card_schema:
    path_example: "raw/datasets/<dataset_id>/DATASET_CARD.yaml"
    fields:
      name: "string"
      description: "string"
      owner: "string"
      created_at: "iso_date_string"
      files: "list[{path: string, description: string}]"
      fields: "list[{name: string, type: string, examples?: list[string]}]"
      intended_use: "list[string]"
  repo_snapshot_schema:
    path_example: "raw/repos/<repo_snapshot>/REPO_SNAPSHOT.yaml"
    fields:
      repo_name: "string"
      source_url: "string"
      snapshot_date: "iso_timestamp"
      vcs: "string (e.g., git)"
      commit: "string"
      notes: "list[string]"

# ==============================================================================
# SOURCE INPUT TYPES (SOURCE-FAITHFUL)
# ==============================================================================
input_source_types_indexed_into_raw:
  articles: true      # SOURCE-FAITHFUL: "(articles, papers, repos, datasets, images, etc.)"
  papers: true        # SOURCE-FAITHFUL
  repositories: true  # SOURCE-FAITHFUL
